name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - dev
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: false
        default: '1.0.0'
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  # ── Pinned dependency versions ──
  # Change these to upgrade dependencies in a controlled manner
  NODE_VERSION: '22.13.1'
  PYTHON_VERSION: '3.12.9'
  FFMPEG_VERSION: '7.1.1'
  TORCH_VERSION: '2.10.0'
  TORCHVISION_VERSION: '0.25.0'
  PILLOW_VERSION: '12.1.0'
  AUDIO_SEPARATOR_VERSION: '0.41.1'
  ONNXRUNTIME_DML_VERSION: '1.24.1'
  ONNXRUNTIME_GPU_VERSION: '1.24.1'
  ONNX_VERSION: '1.20.1'
  PYINSTALLER_VERSION: '6.18.0'
  FPCALC_VERSION: '1.6.0'

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check_release.outputs.should_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if should create release
        id: check_release
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # tag 推送：检查 tag 所在 commit 是否在 main 分支上
            TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref }})
            if git branch -r --contains "$TAG_COMMIT" | grep -q 'origin/main'; then
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "Tag is on main branch, will create release"
            else
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "Tag is NOT on main branch, skipping release"
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发：使用用户选择
            echo "should_release=${{ github.event.inputs.create_release }}" >> $GITHUB_OUTPUT
          else
            # dev 分支 push：不发布 release
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Branch push, skipping release"
          fi

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.version || '1.0.0' }}
          else
            # dev 分支 push：使用 commit SHA 短哈希作为版本标识
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Get changelog
        id: changelog
        shell: bash
        run: |
          # 找到最近的 tag（不含当前 tag）
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # tag 推送：找上一个 tag
            CURRENT_TAG=${GITHUB_REF#refs/tags/}
            PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1)
          else
            # 手动触发或分支 push：找最近的 tag
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          fi

          echo "Previous tag: ${PREV_TAG:-none}"

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" -20)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi

          # 写入到文件避免多行问题
          echo "$COMMITS" > changelog.txt
          echo "Generated changelog:"
          cat changelog.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
        continue-on-error: true

      - name: Install Node dependencies
        run: npm ci

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $ffmpegVersion = "${{ env.FFMPEG_VERSION }}"
          $ffmpegUrl = "https://github.com/GyanD/codexffmpeg/releases/download/${ffmpegVersion}/ffmpeg-${ffmpegVersion}-full_build.7z"
          $ffmpegArchive = "ffmpeg.7z"
          $ffmpegTemp = "ffmpeg-temp"

          Write-Host "Downloading FFmpeg ${ffmpegVersion}..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $ffmpegArchive

          Write-Host "Extracting FFmpeg (full)..."
          $sevenZip = (Get-Command 7z -ErrorAction SilentlyContinue).Source
          if (-not $sevenZip) {
            throw "7z not found in PATH"
          }
          New-Item -ItemType Directory -Path "$ffmpegTemp" -Force | Out-Null
          & $sevenZip x "-o$ffmpegTemp" "-y" "$ffmpegArchive" | Out-Host

          # Find the extracted folder and move binaries
          $extractedDir = Get-ChildItem -Path "$ffmpegTemp" -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Path "ffmpeg" -Force | Out-Null

          Copy-Item "$($extractedDir.FullName)/bin/ffmpeg.exe" "ffmpeg/"
          Copy-Item "$($extractedDir.FullName)/bin/ffprobe.exe" "ffmpeg/"

          # Cleanup
          Remove-Item "$ffmpegArchive" -Force
          Remove-Item "$ffmpegTemp" -Recurse -Force

          Write-Host "FFmpeg ready:"
          Get-ChildItem "ffmpeg"

      - name: Download fpcalc (Chromaprint)
        shell: pwsh
        run: |
          $fpcalcVersion = "${{ env.FPCALC_VERSION }}"
          $fpcalcUrl = "https://github.com/acoustid/chromaprint/releases/download/v${fpcalcVersion}/chromaprint-fpcalc-${fpcalcVersion}-windows-x86_64.zip"
          $fpcalcZip = "fpcalc.zip"

          Write-Host "Downloading fpcalc..."
          Invoke-WebRequest -Uri $fpcalcUrl -OutFile $fpcalcZip

          Write-Host "Extracting fpcalc..."
          Expand-Archive -Path $fpcalcZip -DestinationPath "fpcalc-temp" -Force

          # Find and copy fpcalc.exe
          $fpcalcExe = Get-ChildItem -Path "fpcalc-temp" -Recurse -Filter "fpcalc.exe" | Select-Object -First 1
          Copy-Item $fpcalcExe.FullName "ffmpeg\"

          # Cleanup
          Remove-Item $fpcalcZip -Force
          Remove-Item "fpcalc-temp" -Recurse -Force

          Write-Host "fpcalc ready:"
          Get-ChildItem "ffmpeg"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build audio-separator DML package (AMD/Intel GPU)
        shell: pwsh
        run: |
          Write-Host "Creating Python virtual environment for DML variant..."
          python -m venv tools\venv-dml

          Write-Host "Installing Pillow (required by torchvision)..."
          .\tools\venv-dml\Scripts\pip.exe install pillow==${{ env.PILLOW_VERSION }}

          Write-Host "Installing PyTorch (CPU only)..."
          .\tools\venv-dml\Scripts\pip.exe install torch==${{ env.TORCH_VERSION }} torchvision==${{ env.TORCHVISION_VERSION }} --index-url https://download.pytorch.org/whl/cpu

          Write-Host "Installing audio-separator and PyInstaller..."
          .\tools\venv-dml\Scripts\pip.exe install audio-separator==${{ env.AUDIO_SEPARATOR_VERSION }} pyinstaller==${{ env.PYINSTALLER_VERSION }} onnx==${{ env.ONNX_VERSION }}

          Write-Host "Installing ONNX Runtime DirectML..."
          .\tools\venv-dml\Scripts\pip.exe install onnxruntime-directml==${{ env.ONNXRUNTIME_DML_VERSION }}

          Write-Host "Building audio-separator DML executable..."
          .\tools\venv-dml\Scripts\python.exe .\scripts\build_audio_separator.py --variant dml

          Write-Host "audio-separator DML package ready:"
          Get-ChildItem "src-tauri\resources\audio-separator-dml" -ErrorAction SilentlyContinue

      - name: Build audio-separator CUDA package (NVIDIA GPU)
        shell: pwsh
        run: |
          Write-Host "Creating Python virtual environment for CUDA variant..."
          python -m venv tools\venv-cuda

          Write-Host "Installing Pillow (required by torchvision)..."
          .\tools\venv-cuda\Scripts\pip.exe install pillow==${{ env.PILLOW_VERSION }}

          Write-Host "Installing PyTorch (CUDA)..."
          .\tools\venv-cuda\Scripts\pip.exe install torch==${{ env.TORCH_VERSION }} torchvision==${{ env.TORCHVISION_VERSION }} --index-url https://download.pytorch.org/whl/cu124

          # Verify PyTorch CUDA version (fail fast if CPU-only was installed)
          $torchVer = .\tools\venv-cuda\Scripts\python.exe -c "import torch; print(torch.__version__)"
          Write-Host "Installed PyTorch version: $torchVer"
          if ($torchVer -like '*+cpu*') {
            Write-Error "FATAL: CUDA variant got CPU-only PyTorch ($torchVer). Build aborted."
            exit 1
          }

          Write-Host "Installing audio-separator and PyInstaller..."
          .\tools\venv-cuda\Scripts\pip.exe install audio-separator==${{ env.AUDIO_SEPARATOR_VERSION }} pyinstaller==${{ env.PYINSTALLER_VERSION }} onnx==${{ env.ONNX_VERSION }}

          Write-Host "Installing ONNX Runtime GPU (CUDA)..."
          .\tools\venv-cuda\Scripts\pip.exe install onnxruntime-gpu==${{ env.ONNXRUNTIME_GPU_VERSION }}

          Write-Host "Building audio-separator CUDA executable..."
          .\tools\venv-cuda\Scripts\python.exe .\scripts\build_audio_separator.py --variant cuda

          Write-Host "audio-separator CUDA package ready:"
          Get-ChildItem "src-tauri\resources\audio-separator-cuda" -ErrorAction SilentlyContinue

      - name: Download MDX-Net model and config files
        shell: pwsh
        run: |
          $modelDir = "models\audio-separator\mdx-inst-hq3"
          $modelFile = "UVR-MDX-NET-Inst_HQ_3.onnx"
          $modelUrl = "https://github.com/TRvlvr/model_repo/releases/download/all_public_uvr_models/$modelFile"
          $dataUrlPrefix = "https://raw.githubusercontent.com/TRvlvr/application_data/main"

          Write-Host "Creating model directory..."
          New-Item -ItemType Directory -Path $modelDir -Force | Out-Null

          Write-Host "Downloading MDX-Net model ($modelFile)..."
          Invoke-WebRequest -Uri $modelUrl -OutFile "$modelDir\$modelFile"

          Write-Host "Downloading model config files..."
          Invoke-WebRequest -Uri "$dataUrlPrefix/mdx_model_data/model_data_new.json" -OutFile "$modelDir\mdx_model_data.json"
          Invoke-WebRequest -Uri "$dataUrlPrefix/vr_model_data/model_data_new.json" -OutFile "$modelDir\vr_model_data.json"
          Invoke-WebRequest -Uri "$dataUrlPrefix/filelists/download_checks.json" -OutFile "$modelDir\download_checks.json"

          Write-Host "Model and config files downloaded:"
          Get-ChildItem $modelDir

      - name: Build Tauri application
        shell: pwsh
        run: |
          $env:PATH = "$PWD\ffmpeg;$env:PATH"
          npm run tauri:build

      - name: Create FFmpeg Package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $outputDir = "dist/MusicCut-FFmpeg"
          $archiveName = "MusicCut_${version}_x64_FFmpeg.7z"
          $outputFolder = Split-Path -Leaf $outputDir

          Write-Host "Creating FFmpeg package..."

          # Create output directory
          New-Item -ItemType Directory -Path "$outputDir" -Force | Out-Null

          # Copy main exe
          Copy-Item "src-tauri/target/release/MusicCut.exe" "$outputDir"

          # Copy WebView2Loader.dll if exists
          if (Test-Path "src-tauri/target/release/WebView2Loader.dll") {
            Copy-Item "src-tauri/target/release/WebView2Loader.dll" "$outputDir"
          }

          # Copy FFmpeg
          Copy-Item -Recurse "ffmpeg" "$outputDir/ffmpeg"

          # Copy models if exist
          if (Test-Path "models") {
            Copy-Item -Recurse "models" "$outputDir/models"
          }

          # Copy audio-separator (both CUDA and DML variants)
          if (Test-Path "src-tauri/resources/audio-separator-cuda") {
            Copy-Item -Recurse "src-tauri/resources/audio-separator-cuda" "$outputDir/audio-separator-cuda"
          }
          if (Test-Path "src-tauri/resources/audio-separator-dml") {
            Copy-Item -Recurse "src-tauri/resources/audio-separator-dml" "$outputDir/audio-separator-dml"
          }

          # Create 7z archive (avoid nesting dist/ in the archive)
          Push-Location "dist"
          7z a -t7z -mx=9 "$archiveName" "$outputFolder"
          Pop-Location

          Write-Host "FFmpeg package created: dist/$archiveName"
          Get-ChildItem "dist/*.7z"

      - name: Create NoFFmpeg Package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $outputDir = "dist/MusicCut-NoFFmpeg"
          $archiveName = "MusicCut_${version}_x64_NoFFmpeg.7z"
          $outputFolder = Split-Path -Leaf $outputDir

          Write-Host "Creating NoFFmpeg package..."

          # Create output directory
          New-Item -ItemType Directory -Path "$outputDir" -Force | Out-Null

          # Copy main exe
          Copy-Item "src-tauri/target/release/MusicCut.exe" "$outputDir"

          # Copy WebView2Loader.dll if exists
          if (Test-Path "src-tauri/target/release/WebView2Loader.dll") {
            Copy-Item "src-tauri/target/release/WebView2Loader.dll" "$outputDir"
          }

          # Copy models if exist
          if (Test-Path "models") {
            Copy-Item -Recurse "models" "$outputDir/models"
          }

          # Copy audio-separator (both CUDA and DML variants)
          if (Test-Path "src-tauri/resources/audio-separator-cuda") {
            Copy-Item -Recurse "src-tauri/resources/audio-separator-cuda" "$outputDir/audio-separator-cuda"
          }
          if (Test-Path "src-tauri/resources/audio-separator-dml") {
            Copy-Item -Recurse "src-tauri/resources/audio-separator-dml" "$outputDir/audio-separator-dml"
          }

          # Create 7z archive (avoid nesting dist/ in the archive)
          Push-Location "dist"
          7z a -t7z -mx=9 "$archiveName" "$outputFolder"
          Pop-Location

          Write-Host "NoFFmpeg package created: dist/$archiveName"
          Get-ChildItem "dist/*.7z"

      - name: List artifacts
        shell: pwsh
        run: |
          Write-Host "=== Build Artifacts ==="
          Get-ChildItem "dist\*.7z" | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            Write-Host "$($_.Name) - $sizeMB MB"
          }

      - name: Upload FFmpeg Package
        uses: actions/upload-artifact@v4
        with:
          name: MusicCut_${{ steps.version.outputs.version }}_x64_FFmpeg
          path: dist/MusicCut_${{ steps.version.outputs.version }}_x64_FFmpeg.7z
          compression-level: 0
          retention-days: 30

      - name: Upload NoFFmpeg Package
        uses: actions/upload-artifact@v4
        with:
          name: MusicCut_${{ steps.version.outputs.version }}_x64_NoFFmpeg
          path: dist/MusicCut_${{ steps.version.outputs.version }}_x64_NoFFmpeg.7z
          compression-level: 0
          retention-days: 30

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog.txt
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.should_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read changelog
        id: changelog
        run: |
          if [ -f "artifacts/changelog/changelog.txt" ]; then
            CHANGELOG=$(cat artifacts/changelog/changelog.txt)
          else
            CHANGELOG="- Initial release"
          fi
          # 使用 EOF 处理多行
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          echo "Full directory structure:"
          find artifacts -type f
          echo ""
          echo "7z files:"
          find artifacts -type f -name "*.7z" | while read f; do
            size=$(du -h "$f" | cut -f1)
            echo "$f - $size"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: MusicCut v${{ needs.build.outputs.version }}
          body: |
            ## 更新日志

            ${{ steps.changelog.outputs.content }}

            ---

            ## 下载说明

            | 版本 | 说明 | 适用场景 |
            |:---:|:---|:---|
            | **FFmpeg** | 完整版，包含 FFmpeg | 推荐大多数用户使用 |
            | **NoFFmpeg** | 精简版，不含 FFmpeg | 已安装 FFmpeg 的用户 |

            ## GPU 加速

            程序内置两套 GPU 加速引擎，启动时自动检测并选择：
            - **NVIDIA GPU** → CUDA 加速（完整 GPU 性能）
            - **AMD / Intel GPU** → DirectML 加速

            ## 使用方法

            1. 下载对应版本的 `.7z` 文件
            2. 解压到任意目录
            3. 运行 `MusicCut.exe`

            ## NoFFmpeg 版本说明

            NoFFmpeg 版本需要自行安装 FFmpeg：
            - 下载 [FFmpeg](https://www.gyan.dev/ffmpeg/builds/)
            - 下载 [fpcalc](https://acoustid.org/chromaprint)
            - 将 `ffmpeg.exe`、`ffprobe.exe`、`fpcalc.exe` 放入程序目录的 `ffmpeg` 文件夹，或添加到系统 PATH
          files: |
            artifacts/**/*.7z
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
